<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>JWX Whack-a-Letter</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --jwx-red: #ed0040;
    --jwx-teal: #143048;
    --jwx-dark: #0b1a28;
    --jwx-light: #e8edf1;
    --jwx-pink: #D01884;
  }

  body {
    background: var(--jwx-dark);
    color: #fff;
    font-family: 'Space Grotesk', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
    user-select: none;
  }

  h1 {
    font-size: 2.2rem;
    font-weight: 900;
    margin-bottom: 1rem;
    color: var(--jwx-red);
    letter-spacing: 6px;
    text-transform: uppercase;
  }

  h1 .jwx {
    color: #fff;
  }

  /* Progress bar */
  #progress {
    display: flex;
    gap: 8px;
    margin-bottom: 1.5rem;
    font-size: 1.6rem;
    font-weight: 700;
    letter-spacing: 2px;
  }

  #progress span {
    color: #2a3a48;
    text-shadow: none;
    transition: all 0.3s ease;
  }

  #progress span.lit {
    color: var(--jwx-red);
    text-shadow: 0 0 10px rgba(237, 0, 64, 0.6);
  }

  #progress span.next {
    color: #fff;
    text-shadow: 0 0 10px rgba(255,255,255,0.5);
    animation: pulse 0.6s ease-in-out infinite alternate;
  }

  /* Stats row */
  #stats {
    display: flex;
    gap: 2rem;
    margin-bottom: 1.2rem;
    font-size: 1.1rem;
    font-weight: 700;
    color: #5a7a90;
    align-items: center;
  }

  #lives {
    display: flex;
    gap: 6px;
    align-items: center;
  }

  #lives .heart {
    width: 18px;
    height: 18px;
    display: inline-block;
    transition: all 0.2s;
  }

  #lives .heart.full {
    background: var(--jwx-red);
    clip-path: path('M9 2C6.5-1 0 0 0 5.5 0 9.5 9 16 9 16s9-6.5 9-10.5C18 0 11.5-1 9 2z');
    filter: drop-shadow(0 0 4px var(--jwx-red));
  }

  #lives .heart.empty {
    background: #1e3040;
    clip-path: path('M9 2C6.5-1 0 0 0 5.5 0 9.5 9 16 9 16s9-6.5 9-10.5C18 0 11.5-1 9 2z');
  }

  #lives.hit {
    animation: shake 0.3s ease;
  }

  #score {
    color: var(--jwx-red);
  }

  /* Grid */
  #grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
    margin-bottom: 2rem;
  }

  /* --- Video Player Holes --- */
  .hole {
    width: 120px;
    height: 90px;
    background: #0e1e2c;
    border: 2px solid #1a3048;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  /* Scanline overlay */
  .hole::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(255,255,255,0.01) 2px,
      rgba(255,255,255,0.01) 4px
    );
    pointer-events: none;
    z-index: 2;
  }

  /* Bottom control bar gradient */
  .hole::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 16px;
    background: linear-gradient(to top, #080e16, transparent);
    pointer-events: none;
    z-index: 3;
  }

  .hole .controls {
    position: absolute;
    bottom: 2px;
    left: 6px;
    right: 6px;
    height: 10px;
    display: flex;
    align-items: center;
    gap: 4px;
    z-index: 4;
    pointer-events: none;
  }

  .hole .play-icon {
    width: 0;
    height: 0;
    border-style: solid;
    border-width: 3px 0 3px 6px;
    border-color: transparent transparent transparent #1e3040;
    flex-shrink: 0;
    transition: border-color 0.2s;
  }

  .hole .progress-bar {
    flex: 1;
    height: 3px;
    background: #112030;
    border-radius: 2px;
    overflow: hidden;
    position: relative;
  }

  .hole .progress-fill {
    height: 100%;
    width: 0%;
    background: var(--jwx-red);
    border-radius: 2px;
    transition: width linear;
  }

  .hole .time-label {
    font-size: 7px;
    color: #2a4a5a;
    flex-shrink: 0;
    font-family: 'Space Grotesk', sans-serif;
  }

  .hole:hover {
    border-color: #2a4a60;
  }

  /* JWX logo watermark on idle screens */
  .hole .jwx-logo {
    position: absolute;
    width: 36px;
    height: auto;
    opacity: 0.15;
    z-index: 1;
    pointer-events: none;
    transition: opacity 0.2s;
    filter: grayscale(1) brightness(3);
  }

  .hole.active-screen .jwx-logo {
    opacity: 0;
  }

  /* Letter inside the "screen" */
  .hole .letter {
    font-size: 2.2rem;
    font-weight: 800;
    opacity: 0;
    transform: scale(0);
    transition: none;
    pointer-events: none;
    position: absolute;
    z-index: 1;
    font-family: 'Space Grotesk', sans-serif;
  }

  .hole .letter.show {
    opacity: 1;
    transform: scale(1);
    animation: tvOn 0.25s ease-out;
    text-shadow: 0 0 20px currentColor, 0 0 40px currentColor;
  }

  .hole .letter.hide {
    animation: tvOff 0.2s ease-in forwards;
  }

  /* Active state — screen "on" */
  .hole.active-screen {
    border-color: #1e4058;
    box-shadow: inset 0 0 20px rgba(20, 48, 72, 0.3), 0 0 12px rgba(237, 0, 64, 0.1);
    background: radial-gradient(ellipse at center, #122438 0%, #0b1820 100%);
  }

  .hole.active-screen .play-icon {
    border-color: transparent transparent transparent var(--jwx-red);
  }

  .hole.correct-hit {
    animation: correctFlash 0.4s ease;
  }

  .hole.wrong-hit {
    animation: shake 0.3s ease;
  }

  /* Start / Win screen */
  #overlay {
    position: fixed;
    inset: 0;
    background: var(--jwx-dark);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    overflow: hidden;
  }

  #overlay.hidden { display: none; }

  #overlay .attract-bg {
    position: absolute;
    inset: 0;
    opacity: 0.15;
    z-index: 0;
    overflow: hidden;
  }

  #overlay .attract-letter {
    position: absolute;
    font-size: 2rem;
    font-weight: 800;
    pointer-events: none;
    animation: floatLetter linear infinite;
  }

  #overlay .attract-content {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  #overlay h2 {
    font-size: 3.2rem;
    font-weight: 900;
    color: var(--jwx-red);
    margin-bottom: 0.3rem;
    letter-spacing: 5px;
    animation: titleBounce 2s ease-in-out infinite;
  }

  #overlay .title-sub {
    font-size: 1.4rem;
    font-weight: 700;
    color: #fff;
    letter-spacing: 8px;
    margin-bottom: 1.5rem;
    opacity: 0.9;
  }

  #overlay .high-score {
    font-size: 0.95rem;
    font-weight: 700;
    color: var(--jwx-red);
    margin-bottom: 0.4rem;
    animation: flashText 1.2s ease-in-out infinite;
  }

  #overlay .instructions {
    font-size: 0.85rem;
    color: #3a5a70;
    margin-bottom: 2rem;
    text-align: center;
    line-height: 1.8;
  }

  #overlay .instructions span {
    color: #5a8aa0;
  }

  #overlay .subtitle {
    font-size: 1.1rem;
    font-weight: 400;
    color: #5a7a90;
    margin-bottom: 2rem;
    text-align: center;
    line-height: 1.6;
  }

  #overlay button {
    padding: 16px 48px;
    font-size: 1.2rem;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 800;
    background: var(--jwx-red);
    color: #fff;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
    letter-spacing: 4px;
    animation: btnPulse 1.5s ease-in-out infinite;
  }

  #overlay button:hover {
    background: #ff1a5c;
    box-shadow: 0 0 40px rgba(237, 0, 64, 0.5);
    transform: translateY(-2px) scale(1.05);
    animation: none;
  }

  #overlay .credits {
    margin-top: 2rem;
    font-size: 0.7rem;
    color: #1e3040;
    letter-spacing: 2px;
  }

  @keyframes titleBounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  @keyframes flashText {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  @keyframes btnPulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(237,0,64,0.4); }
    50% { box-shadow: 0 0 20px 8px rgba(237,0,64,0.2); }
  }

  @keyframes floatLetter {
    0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
  }

  /* Confetti */
  .confetti {
    position: fixed;
    width: 8px;
    height: 8px;
    border-radius: 2px;
    z-index: 200;
    pointer-events: none;
    animation: confettiFall linear forwards;
  }

  /* Particle burst */
  .particle {
    position: fixed;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    pointer-events: none;
    z-index: 50;
  }

  /* Animations */
  @keyframes pulse {
    from { opacity: 0.5; }
    to { opacity: 1; }
  }

  @keyframes tvOn {
    0% { opacity: 0; transform: scaleX(1.3) scaleY(0.01); }
    40% { opacity: 1; transform: scaleX(1.1) scaleY(0.6); }
    70% { transform: scaleX(0.95) scaleY(1.1); }
    100% { opacity: 1; transform: scale(1); }
  }

  @keyframes tvOff {
    0% { opacity: 1; transform: scale(1); }
    40% { transform: scaleX(1.2) scaleY(0.5); opacity: 1; }
    100% { opacity: 0; transform: scaleX(1.4) scaleY(0.01); }
  }

  @keyframes correctFlash {
    0% { border-color: #1a3048; box-shadow: none; }
    50% { border-color: var(--jwx-red); box-shadow: 0 0 30px rgba(237,0,64,0.4), inset 0 0 20px rgba(237,0,64,0.1); }
    100% { border-color: #1a3048; box-shadow: none; }
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-8px); }
    75% { transform: translateX(8px); }
  }

  @keyframes confettiFall {
    0% { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }
</style>
</head>
<body>

<h1><span class="jwx">JWX</span> WHACK-A-LETTER</h1>

<div id="progress"></div>
<div id="stats">
  <span id="timer">0.00s</span>
  <span id="lives"></span>
  <span id="score">Score: 0</span>
</div>

<div id="grid"></div>

<!-- Attract / Win / Lose screen -->
<div id="overlay">
  <div class="attract-bg" id="attractBg"></div>
  <div class="attract-content" id="attractContent">
    <h2 id="overlayTitle">WHACK-A-LETTER</h2>
    <div class="title-sub" id="titleSub">JWX</div>
    <div class="high-score" id="highScoreDisplay">HIGH SCORE: 0</div>
    <div class="instructions" id="overlayInstructions">
      <span>H</span> <span>E</span> <span>L</span> <span>L</span> <span>O</span>
      &nbsp;&nbsp;
      <span>W</span> <span>O</span> <span>R</span> <span>L</span> <span>D</span>
      <br>Click the letters in order — 3 lives — don't miss!
    </div>
    <div class="subtitle" id="overlaySubtitle"></div>
    <button id="overlayBtn" onclick="startGame()">START</button>
    <div class="credits">BUILT WITH CLAUDE CODE</div>
  </div>
</div>

<script>
  const TARGET = 'HELLOWORLD';
  const DISPLAY = 'H E L L O   W O R L D';
  const ALL_LETTERS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  const HOLES_COUNT = 12;
  const LETTER_SHOW_TIME = 1200;
  const SPAWN_INTERVAL = 600;
  const COLORS = ['#ed0040', '#D01884', '#ff5c8a', '#143048', '#2a7ab5', '#5ac8fa', '#ff8a3d', '#40e0b0'];

  const MAX_LIVES = 3;
  let currentIndex = 0;
  let startTime = 0;
  let timerInterval = null;
  let spawnInterval = null;
  let gameActive = false;
  let lives = MAX_LIVES;
  let score = 0;

  // --- Sound FX ---
  const AudioCtx = window.AudioContext || window.webkitAudioContext;
  let audioCtx;
  function ensureAudio() {
    if (!audioCtx) audioCtx = new AudioCtx();
    if (audioCtx.state === 'suspended') audioCtx.resume();
  }

  function playPop() {
    ensureAudio();
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.type = 'sine';
    o.frequency.setValueAtTime(880, audioCtx.currentTime);
    o.frequency.exponentialRampToValueAtTime(1320, audioCtx.currentTime + 0.08);
    g.gain.setValueAtTime(0.3, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
    o.start(); o.stop(audioCtx.currentTime + 0.15);
  }

  function playBuzz() {
    ensureAudio();
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(120, audioCtx.currentTime);
    o.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.2);
    g.gain.setValueAtTime(0.2, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.25);
    o.start(); o.stop(audioCtx.currentTime + 0.25);
  }

  function playFanfare() {
    ensureAudio();
    // Original ascending triumph — Bb major arpeggio with a 6th
    const notes = [466, 587, 698, 932, 1175];
    notes.forEach((freq, i) => {
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.connect(g); g.connect(audioCtx.destination);
      o.type = 'triangle';
      const t = audioCtx.currentTime + i * 0.12;
      o.frequency.setValueAtTime(freq, t);
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.25, t + 0.04);
      g.gain.exponentialRampToValueAtTime(0.01, t + 0.5);
      o.start(t); o.stop(t + 0.5);
    });
    // Shimmer chord
    const t2 = audioCtx.currentTime + 0.6;
    [466, 587, 698, 932].forEach(freq => {
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.connect(g); g.connect(audioCtx.destination);
      o.type = 'sine';
      o.frequency.setValueAtTime(freq, t2);
      g.gain.setValueAtTime(0.12, t2);
      g.gain.exponentialRampToValueAtTime(0.01, t2 + 1.2);
      o.start(t2); o.stop(t2 + 1.2);
    });
  }

  function playLose() {
    ensureAudio();
    const notes = [370, 330, 277, 233];
    notes.forEach((freq, i) => {
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.connect(g); g.connect(audioCtx.destination);
      o.type = 'sawtooth';
      const t = audioCtx.currentTime + i * 0.22;
      o.frequency.setValueAtTime(freq, t);
      g.gain.setValueAtTime(0.12, t);
      g.gain.exponentialRampToValueAtTime(0.01, t + 0.4);
      o.start(t); o.stop(t + 0.4);
    });
  }

  // --- Background Music (MP3) ---
  const bgm = new Audio('bgm.mp3');
  bgm.loop = true;
  bgm.volume = 0.4;

  function startBGM() {
    bgm.currentTime = 0;
    bgm.play().catch(() => {});
  }

  function stopBGM() {
    bgm.pause();
    bgm.currentTime = 0;
  }

  function updateLivesDisplay() {
    const el = document.getElementById('lives');
    el.innerHTML = '';
    for (let i = 0; i < MAX_LIVES; i++) {
      const heart = document.createElement('span');
      heart.className = 'heart ' + (i < lives ? 'full' : 'empty');
      el.appendChild(heart);
    }
  }

  function updateScoreDisplay() {
    document.getElementById('score').textContent = `Score: ${score}`;
  }

  // Build grid
  const grid = document.getElementById('grid');
  const holes = [];
  for (let i = 0; i < HOLES_COUNT; i++) {
    const hole = document.createElement('div');
    hole.className = 'hole';
    hole.innerHTML = `
      <img class="jwx-logo" src="https://jwx.com/hs-fs/hubfs/JWX_logo.png" alt="">
      <span class="letter"></span>
      <div class="controls">
        <span class="play-icon"></span>
        <div class="progress-bar"><div class="progress-fill"></div></div>
        <span class="time-label">0:00</span>
      </div>
    `;
    hole.addEventListener('click', () => onHoleClick(i));
    grid.appendChild(hole);
    holes.push({
      el: hole,
      letterEl: hole.querySelector('.letter'),
      fillEl: hole.querySelector('.progress-fill'),
      timeEl: hole.querySelector('.time-label'),
      active: false,
      letter: '',
      timeout: null
    });
  }

  // Build progress
  const progress = document.getElementById('progress');
  const progressSpans = [];
  for (const ch of DISPLAY) {
    const span = document.createElement('span');
    span.textContent = ch;
    if (ch === ' ') span.style.width = '12px';
    progress.appendChild(span);
    progressSpans.push(span);
  }

  function updateProgress() {
    const displayChars = DISPLAY.split('');
    let targetIdx = 0;
    for (let i = 0; i < displayChars.length; i++) {
      if (displayChars[i] === ' ') continue;
      progressSpans[i].classList.remove('lit', 'next');
      if (targetIdx < currentIndex) {
        progressSpans[i].classList.add('lit');
      } else if (targetIdx === currentIndex) {
        progressSpans[i].classList.add('next');
      }
      targetIdx++;
    }
  }

  function getRandomLetter() {
    if (Math.random() < 0.4 && currentIndex < TARGET.length) {
      return TARGET[currentIndex];
    }
    return ALL_LETTERS[Math.floor(Math.random() * ALL_LETTERS.length)];
  }

  function spawnLetter() {
    if (!gameActive) return;
    const emptyHoles = holes.map((h, i) => ({ ...h, idx: i })).filter(h => !h.active);
    if (emptyHoles.length === 0) return;

    const pick = emptyHoles[Math.floor(Math.random() * emptyHoles.length)];
    const idx = pick.idx;
    const hole = holes[idx];
    const letter = getRandomLetter();
    const color = COLORS[Math.floor(Math.random() * COLORS.length)];

    hole.active = true;
    hole.letter = letter;
    hole.letterEl.textContent = letter;
    hole.letterEl.style.color = color;
    hole.letterEl.classList.remove('hide');
    hole.letterEl.classList.add('show');
    hole.el.classList.add('active-screen');

    hole.fillEl.style.transition = 'none';
    hole.fillEl.style.width = '0%';
    hole.fillEl.style.background = color;
    void hole.fillEl.offsetWidth;
    hole.fillEl.style.transition = `width ${LETTER_SHOW_TIME}ms linear`;
    hole.fillEl.style.width = '100%';

    let remaining = LETTER_SHOW_TIME;
    hole.timeEl.textContent = (remaining / 1000).toFixed(1);
    hole._countdownInterval = setInterval(() => {
      remaining -= 100;
      if (remaining <= 0) {
        clearInterval(hole._countdownInterval);
        hole.timeEl.textContent = '0.0';
      } else {
        hole.timeEl.textContent = (remaining / 1000).toFixed(1);
      }
    }, 100);

    clearTimeout(hole.timeout);
    hole.timeout = setTimeout(() => hideLetter(idx), LETTER_SHOW_TIME);
  }

  function hideLetter(idx) {
    const hole = holes[idx];
    if (!hole.active) return;
    hole.letterEl.classList.remove('show');
    hole.letterEl.classList.add('hide');
    clearInterval(hole._countdownInterval);
    setTimeout(() => {
      hole.active = false;
      hole.letter = '';
      hole.letterEl.classList.remove('hide');
      hole.el.classList.remove('active-screen');
      hole.fillEl.style.transition = 'none';
      hole.fillEl.style.width = '0%';
      hole.timeEl.textContent = '0:00';
    }, 200);
  }

  function onHoleClick(idx) {
    if (!gameActive) return;
    const hole = holes[idx];
    if (!hole.active) return;

    const needed = TARGET[currentIndex];
    if (hole.letter === needed) {
      currentIndex++;
      score += 100;
      playPop();
      updateScoreDisplay();
      hole.el.classList.remove('correct-hit');
      void hole.el.offsetWidth;
      hole.el.classList.add('correct-hit');
      spawnParticles(hole.el);
      hideLetter(idx);
      updateProgress();
      if (currentIndex >= TARGET.length) winGame();
    } else {
      lives--;
      playBuzz();
      updateLivesDisplay();
      const livesEl = document.getElementById('lives');
      livesEl.classList.remove('hit');
      void livesEl.offsetWidth;
      livesEl.classList.add('hit');
      hole.el.classList.remove('wrong-hit');
      void hole.el.offsetWidth;
      hole.el.classList.add('wrong-hit');
      if (lives <= 0) loseGame();
    }
  }

  function spawnParticles(el) {
    const rect = el.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    for (let i = 0; i < 12; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const angle = (Math.PI * 2 * i) / 12;
      const dist = 40 + Math.random() * 40;
      const dx = Math.cos(angle) * dist;
      const dy = Math.sin(angle) * dist;
      const color = COLORS[Math.floor(Math.random() * COLORS.length)];
      p.style.cssText = `left:${cx}px;top:${cy}px;background:${color};box-shadow:0 0 6px ${color};transition:all 0.5s ease-out;`;
      document.body.appendChild(p);
      requestAnimationFrame(() => {
        p.style.transform = `translate(${dx}px, ${dy}px)`;
        p.style.opacity = '0';
      });
      setTimeout(() => p.remove(), 500);
    }
  }

  function startGame() {
    currentIndex = 0;
    lives = MAX_LIVES;
    score = 0;
    gameActive = true;
    startTime = Date.now();
    updateProgress();
    updateLivesDisplay();
    updateScoreDisplay();
    document.getElementById('overlay').classList.add('hidden');
    startBGM();

    holes.forEach((h) => {
      clearTimeout(h.timeout);
      clearInterval(h._countdownInterval);
      h.active = false;
      h.letter = '';
      h.letterEl.classList.remove('show', 'hide');
      h.el.classList.remove('active-screen');
      h.fillEl.style.transition = 'none';
      h.fillEl.style.width = '0%';
      h.timeEl.textContent = '0:00';
    });

    timerInterval = setInterval(() => {
      const elapsed = ((Date.now() - startTime) / 1000).toFixed(2);
      document.getElementById('timer').textContent = elapsed + 's';
    }, 50);

    spawnInterval = setInterval(spawnLetter, SPAWN_INTERVAL);
  }

  function loseGame() {
    gameActive = false;
    clearInterval(timerInterval);
    clearInterval(spawnInterval);
    stopBGM();
    playLose();
    holes.forEach((h, i) => { clearTimeout(h.timeout); clearInterval(h._countdownInterval); hideLetter(i); });

    document.body.style.transition = 'background 0.2s';
    document.body.style.background = '#1a0a10';
    setTimeout(() => { document.body.style.background = 'var(--jwx-dark)'; }, 300);

    setTimeout(() => {
      updateHighScore();
      showOverlay('GAME OVER', '#f44', `Score: ${score} · Got ${currentIndex}/${TARGET.length} letters`, 'TRY AGAIN', false);
    }, 800);
  }

  function winGame() {
    gameActive = false;
    clearInterval(timerInterval);
    clearInterval(spawnInterval);
    stopBGM();
    const finalTime = ((Date.now() - startTime) / 1000).toFixed(2);
    holes.forEach((h, i) => { clearTimeout(h.timeout); clearInterval(h._countdownInterval); hideLetter(i); });
    playFanfare();

    for (let i = 0; i < 80; i++) {
      setTimeout(() => {
        const c = document.createElement('div');
        c.className = 'confetti';
        const color = COLORS[Math.floor(Math.random() * COLORS.length)];
        c.style.cssText = `left:${Math.random()*100}vw;top:-10px;background:${color};box-shadow:0 0 4px ${color};animation-duration:${1.5+Math.random()*2}s;`;
        document.body.appendChild(c);
        setTimeout(() => c.remove(), 4000);
      }, i * 30);
    }

    setTimeout(() => {
      updateHighScore();
      showOverlay('HELLO WORLD!', 'var(--jwx-red)', `Score: ${score} · Completed in ${finalTime}s`, 'PLAY AGAIN', false);
    }, 1200);
  }

  // --- Attract Mode ---
  let highScore = parseInt(localStorage.getItem('jwx-whack-highscore') || '0');
  let attractInterval = null;

  function updateHighScore() {
    if (score > highScore) {
      highScore = score;
      localStorage.setItem('jwx-whack-highscore', highScore);
    }
    document.getElementById('highScoreDisplay').textContent = `HIGH SCORE: ${highScore}`;
  }

  function startAttractMode() {
    updateHighScore();
    const bg = document.getElementById('attractBg');
    bg.innerHTML = '';
    // Spawn floating letters continuously
    attractInterval = setInterval(() => {
      if (document.getElementById('overlay').classList.contains('hidden')) {
        clearInterval(attractInterval);
        return;
      }
      const letter = ALL_LETTERS[Math.floor(Math.random() * ALL_LETTERS.length)];
      const el = document.createElement('span');
      el.className = 'attract-letter';
      el.textContent = letter;
      const color = COLORS[Math.floor(Math.random() * COLORS.length)];
      const left = Math.random() * 100;
      const dur = 4 + Math.random() * 6;
      const size = 1.2 + Math.random() * 2;
      el.style.cssText = `left:${left}%;color:${color};font-size:${size}rem;animation-duration:${dur}s;`;
      bg.appendChild(el);
      setTimeout(() => el.remove(), dur * 1000);
    }, 300);
  }

  function showOverlay(title, titleColor, subtitle, btnText, showAttract) {
    const t = document.getElementById('overlayTitle');
    t.textContent = title;
    t.style.color = titleColor;
    t.style.textShadow = titleColor === '#f44' ? '0 0 30px rgba(255,68,68,0.5)' : '';
    t.style.animation = showAttract ? 'titleBounce 2s ease-in-out infinite' : 'none';

    document.getElementById('titleSub').style.display = showAttract ? '' : 'none';
    document.getElementById('highScoreDisplay').style.display = showAttract ? '' : 'none';
    document.getElementById('overlayInstructions').style.display = showAttract ? '' : 'none';
    document.getElementById('overlaySubtitle').textContent = subtitle || '';
    document.getElementById('overlaySubtitle').style.display = subtitle ? '' : 'none';
    document.getElementById('overlayBtn').textContent = btnText;
    document.querySelector('.credits').style.display = showAttract ? '' : 'none';

    document.getElementById('overlay').classList.remove('hidden');
    if (showAttract) startAttractMode();
  }

  // Initial state
  updateProgress();
  updateLivesDisplay();
  startAttractMode();
</script>

</body>
</html>
