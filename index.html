<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hello World Whack-a-Mole</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a1a;
    color: #fff;
    font-family: 'Courier New', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
    user-select: none;
  }

  h1 {
    font-size: 2rem;
    margin-bottom: 1rem;
    text-shadow: 0 0 20px #0ff, 0 0 40px #0ff;
    color: #0ff;
    letter-spacing: 4px;
  }

  /* Progress bar */
  #progress {
    display: flex;
    gap: 8px;
    margin-bottom: 1.5rem;
    font-size: 1.6rem;
    letter-spacing: 2px;
  }

  #progress span {
    color: #333;
    text-shadow: none;
    transition: all 0.3s ease;
  }

  #progress span.lit {
    color: #0f0;
    text-shadow: 0 0 10px #0f0, 0 0 20px #0f0;
  }

  #progress span.next {
    color: #ff0;
    text-shadow: 0 0 10px #ff0;
    animation: pulse 0.6s ease-in-out infinite alternate;
  }

  /* Stats row */
  #stats {
    display: flex;
    gap: 2rem;
    margin-bottom: 1.2rem;
    font-size: 1.2rem;
    color: #888;
    align-items: center;
  }

  #lives {
    display: flex;
    gap: 6px;
    align-items: center;
  }

  #lives .heart {
    width: 18px;
    height: 18px;
    display: inline-block;
    transition: all 0.2s;
  }

  #lives .heart.full {
    background: #f44;
    clip-path: path('M9 2C6.5-1 0 0 0 5.5 0 9.5 9 16 9 16s9-6.5 9-10.5C18 0 11.5-1 9 2z');
    filter: drop-shadow(0 0 4px #f44);
  }

  #lives .heart.empty {
    background: #333;
    clip-path: path('M9 2C6.5-1 0 0 0 5.5 0 9.5 9 16 9 16s9-6.5 9-10.5C18 0 11.5-1 9 2z');
  }

  #lives.hit {
    animation: shake 0.3s ease;
  }

  #score {
    color: #0ff;
    text-shadow: 0 0 8px rgba(0,255,255,0.3);
  }

  /* Grid */
  #grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
    margin-bottom: 2rem;
  }

  /* --- Video Player Holes --- */
  .hole {
    width: 120px;
    height: 90px;
    background: #111;
    border: 2px solid #2a2a3a;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  /* Scanline overlay */
  .hole::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(255,255,255,0.015) 2px,
      rgba(255,255,255,0.015) 4px
    );
    pointer-events: none;
    z-index: 2;
  }

  /* Bottom control bar */
  .hole::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 16px;
    background: linear-gradient(to top, #0a0a12, transparent);
    pointer-events: none;
    z-index: 3;
  }

  .hole .controls {
    position: absolute;
    bottom: 2px;
    left: 6px;
    right: 6px;
    height: 10px;
    display: flex;
    align-items: center;
    gap: 4px;
    z-index: 4;
    pointer-events: none;
  }

  .hole .play-icon {
    width: 0;
    height: 0;
    border-style: solid;
    border-width: 3px 0 3px 6px;
    border-color: transparent transparent transparent #555;
    flex-shrink: 0;
    transition: border-color 0.2s;
  }

  .hole .progress-bar {
    flex: 1;
    height: 3px;
    background: #222;
    border-radius: 2px;
    overflow: hidden;
    position: relative;
  }

  .hole .progress-fill {
    height: 100%;
    width: 0%;
    background: #f44;
    border-radius: 2px;
    transition: width linear;
  }

  .hole .time-label {
    font-size: 7px;
    color: #555;
    flex-shrink: 0;
  }

  .hole:hover {
    border-color: #444;
  }

  /* Letter inside the "screen" */
  .hole .letter {
    font-size: 2.2rem;
    font-weight: bold;
    opacity: 0;
    transform: scale(0);
    transition: none;
    pointer-events: none;
    position: absolute;
    z-index: 1;
  }

  .hole .letter.show {
    opacity: 1;
    transform: scale(1);
    animation: tvOn 0.25s ease-out;
    text-shadow: 0 0 20px currentColor, 0 0 40px currentColor;
  }

  .hole .letter.hide {
    animation: tvOff 0.2s ease-in forwards;
  }

  /* Active state — screen "on" */
  .hole.active-screen {
    border-color: #333;
    box-shadow: inset 0 0 20px rgba(100, 100, 255, 0.05), 0 0 8px rgba(100, 100, 255, 0.1);
    background: radial-gradient(ellipse at center, #151528 0%, #0d0d18 100%);
  }

  .hole.active-screen .play-icon {
    border-color: transparent transparent transparent #f44;
  }

  .hole.correct-hit {
    animation: correctFlash 0.4s ease;
  }

  .hole.wrong-hit {
    animation: shake 0.3s ease;
  }

  /* Start / Win screen */
  #overlay {
    position: fixed;
    inset: 0;
    background: rgba(10, 10, 26, 0.95);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
  }

  #overlay.hidden { display: none; }

  #overlay h2 {
    font-size: 2.5rem;
    color: #0ff;
    text-shadow: 0 0 30px #0ff;
    margin-bottom: 1rem;
  }

  #overlay .subtitle {
    font-size: 1.2rem;
    color: #888;
    margin-bottom: 2rem;
    text-align: center;
    line-height: 1.6;
  }

  #overlay button {
    padding: 14px 40px;
    font-size: 1.2rem;
    font-family: 'Courier New', monospace;
    background: transparent;
    color: #0ff;
    border: 2px solid #0ff;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  #overlay button:hover {
    background: #0ff;
    color: #0a0a1a;
    box-shadow: 0 0 30px #0ff;
  }

  /* Confetti */
  .confetti {
    position: fixed;
    width: 8px;
    height: 8px;
    border-radius: 2px;
    z-index: 200;
    pointer-events: none;
    animation: confettiFall linear forwards;
  }

  /* Particle burst */
  .particle {
    position: fixed;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    pointer-events: none;
    z-index: 50;
  }

  /* Animations */
  @keyframes pulse {
    from { opacity: 0.5; }
    to { opacity: 1; }
  }

  @keyframes tvOn {
    0% { opacity: 0; transform: scaleX(1.3) scaleY(0.01); }
    40% { opacity: 1; transform: scaleX(1.1) scaleY(0.6); }
    70% { transform: scaleX(0.95) scaleY(1.1); }
    100% { opacity: 1; transform: scale(1); }
  }

  @keyframes tvOff {
    0% { opacity: 1; transform: scale(1); }
    40% { transform: scaleX(1.2) scaleY(0.5); opacity: 1; }
    100% { opacity: 0; transform: scaleX(1.4) scaleY(0.01); }
  }

  @keyframes correctFlash {
    0% { border-color: #2a2a3a; box-shadow: none; }
    50% { border-color: #0f0; box-shadow: 0 0 30px #0f0, inset 0 0 30px rgba(0,255,0,0.15); }
    100% { border-color: #2a2a3a; box-shadow: none; }
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-8px); }
    75% { transform: translateX(8px); }
  }

  @keyframes confettiFall {
    0% { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }
</style>
</head>
<body>

<h1>WHACK-A-LETTER</h1>

<div id="progress"></div>
<div id="stats">
  <span id="timer">0.00s</span>
  <span id="lives"></span>
  <span id="score">Score: 0</span>
</div>

<div id="grid"></div>

<!-- Start screen -->
<div id="overlay">
  <h2 id="overlayTitle">WHACK-A-LETTER</h2>
  <div class="subtitle" id="overlaySubtitle">Click the letters in order to spell HELLO WORLD</div>
  <button id="overlayBtn" onclick="startGame()">START</button>
</div>

<script>
  const TARGET = 'HELLOWORLD';
  const DISPLAY = 'H E L L O   W O R L D';
  const ALL_LETTERS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  const HOLES_COUNT = 12;
  const LETTER_SHOW_TIME = 1200;
  const SPAWN_INTERVAL = 600;
  const COLORS = ['#0ff', '#f0f', '#ff0', '#0f0', '#f90', '#f44', '#4af', '#af4'];

  const MAX_LIVES = 3;
  let currentIndex = 0;
  let startTime = 0;
  let timerInterval = null;
  let spawnInterval = null;
  let gameActive = false;
  let lives = MAX_LIVES;
  let score = 0;

  // --- Sound FX (Web Audio API, no files needed) ---
  const AudioCtx = window.AudioContext || window.webkitAudioContext;
  let audioCtx;
  function ensureAudio() {
    if (!audioCtx) audioCtx = new AudioCtx();
    if (audioCtx.state === 'suspended') audioCtx.resume();
  }

  function playPop() {
    ensureAudio();
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.type = 'sine';
    o.frequency.setValueAtTime(880, audioCtx.currentTime);
    o.frequency.exponentialRampToValueAtTime(1320, audioCtx.currentTime + 0.08);
    g.gain.setValueAtTime(0.3, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
    o.start(); o.stop(audioCtx.currentTime + 0.15);
  }

  function playBuzz() {
    ensureAudio();
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(120, audioCtx.currentTime);
    o.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.2);
    g.gain.setValueAtTime(0.2, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.25);
    o.start(); o.stop(audioCtx.currentTime + 0.25);
  }

  function playFanfare() {
    ensureAudio();
    const notes = [523, 659, 784, 1047];
    notes.forEach((freq, i) => {
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.connect(g); g.connect(audioCtx.destination);
      o.type = 'triangle';
      const t = audioCtx.currentTime + i * 0.15;
      o.frequency.setValueAtTime(freq, t);
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.3, t + 0.05);
      g.gain.exponentialRampToValueAtTime(0.01, t + 0.5);
      o.start(t); o.stop(t + 0.5);
    });
    const t2 = audioCtx.currentTime + 0.6;
    [523, 659, 784, 1047].forEach(freq => {
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.connect(g); g.connect(audioCtx.destination);
      o.type = 'sine';
      o.frequency.setValueAtTime(freq, t2);
      g.gain.setValueAtTime(0.15, t2);
      g.gain.exponentialRampToValueAtTime(0.01, t2 + 1.0);
      o.start(t2); o.stop(t2 + 1.0);
    });
  }

  function playLose() {
    ensureAudio();
    const notes = [440, 370, 311, 261];
    notes.forEach((freq, i) => {
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.connect(g); g.connect(audioCtx.destination);
      o.type = 'sawtooth';
      const t = audioCtx.currentTime + i * 0.2;
      o.frequency.setValueAtTime(freq, t);
      g.gain.setValueAtTime(0.15, t);
      g.gain.exponentialRampToValueAtTime(0.01, t + 0.4);
      o.start(t); o.stop(t + 0.4);
    });
  }

  // --- Nintendo-style Background Music ---
  let bgmPlaying = false;
  let bgmTimeout = null;

  const BGM_MELODY = [
    [659, 0.15], [659, 0.15], [0, 0.15], [659, 0.15],
    [0, 0.15], [523, 0.15], [659, 0.15], [0, 0.15],
    [784, 0.15], [0, 0.45], [392, 0.15], [0, 0.45],
    [523, 0.2], [0, 0.1], [392, 0.2], [0, 0.1],
    [330, 0.2], [0, 0.1],
    [440, 0.15], [494, 0.15], [0, 0.1], [466, 0.15],
    [440, 0.15], [0, 0.1],
    [392, 0.13], [659, 0.13], [784, 0.13],
    [880, 0.15], [0, 0.1], [698, 0.15], [784, 0.15],
    [0, 0.1], [659, 0.15], [0, 0.1],
    [523, 0.15], [587, 0.15], [494, 0.15],
    [0, 0.2],
  ];

  const BGM_BASS = [
    [131, 0.3], [0, 0.3], [131, 0.3], [0, 0.3],
    [196, 0.3], [0, 0.3], [196, 0.3], [0, 0.3],
    [165, 0.3], [0, 0.3], [131, 0.3], [0, 0.3],
    [175, 0.3], [0, 0.3], [196, 0.3], [0, 0.3],
    [131, 0.3], [0, 0.3], [165, 0.3], [0, 0.3],
    [196, 0.3], [0, 0.3], [220, 0.3], [0, 0.3],
  ];

  function playBGMLine(notes, type, gainVal, st) {
    let t = st;
    notes.forEach(([freq, dur]) => {
      if (freq > 0) {
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.connect(g); g.connect(audioCtx.destination);
        o.type = type;
        o.frequency.setValueAtTime(freq, t);
        g.gain.setValueAtTime(gainVal, t);
        g.gain.setValueAtTime(gainVal, t + dur * 0.8);
        g.gain.linearRampToValueAtTime(0, t + dur);
        o.start(t); o.stop(t + dur);
      }
      t += dur;
    });
    return t - st;
  }

  function startBGM() {
    if (bgmPlaying) return;
    ensureAudio();
    bgmPlaying = true;
    function loopBGM() {
      if (!bgmPlaying) return;
      const now = audioCtx.currentTime + 0.05;
      const melodyDur = playBGMLine(BGM_MELODY, 'square', 0.08, now);
      playBGMLine(BGM_BASS, 'triangle', 0.1, now);
      bgmTimeout = setTimeout(loopBGM, melodyDur * 1000);
    }
    loopBGM();
  }

  function stopBGM() {
    bgmPlaying = false;
    clearTimeout(bgmTimeout);
  }

  function updateLivesDisplay() {
    const el = document.getElementById('lives');
    el.innerHTML = '';
    for (let i = 0; i < MAX_LIVES; i++) {
      const heart = document.createElement('span');
      heart.className = 'heart ' + (i < lives ? 'full' : 'empty');
      el.appendChild(heart);
    }
  }

  function updateScoreDisplay() {
    document.getElementById('score').textContent = `Score: ${score}`;
  }

  // Build grid — each hole is a mini video player
  const grid = document.getElementById('grid');
  const holes = [];
  for (let i = 0; i < HOLES_COUNT; i++) {
    const hole = document.createElement('div');
    hole.className = 'hole';
    hole.innerHTML = `
      <span class="letter"></span>
      <div class="controls">
        <span class="play-icon"></span>
        <div class="progress-bar"><div class="progress-fill"></div></div>
        <span class="time-label">0:00</span>
      </div>
    `;
    hole.addEventListener('click', () => onHoleClick(i));
    grid.appendChild(hole);
    holes.push({
      el: hole,
      letterEl: hole.querySelector('.letter'),
      fillEl: hole.querySelector('.progress-fill'),
      timeEl: hole.querySelector('.time-label'),
      active: false,
      letter: '',
      timeout: null
    });
  }

  // Build progress
  const progress = document.getElementById('progress');
  const progressSpans = [];
  for (const ch of DISPLAY) {
    const span = document.createElement('span');
    span.textContent = ch;
    if (ch === ' ') span.style.width = '12px';
    progress.appendChild(span);
    progressSpans.push(span);
  }

  function updateProgress() {
    const displayChars = DISPLAY.split('');
    let targetIdx = 0;
    for (let i = 0; i < displayChars.length; i++) {
      if (displayChars[i] === ' ') continue;
      progressSpans[i].classList.remove('lit', 'next');
      if (targetIdx < currentIndex) {
        progressSpans[i].classList.add('lit');
      } else if (targetIdx === currentIndex) {
        progressSpans[i].classList.add('next');
      }
      targetIdx++;
    }
  }

  function getRandomLetter() {
    if (Math.random() < 0.4 && currentIndex < TARGET.length) {
      return TARGET[currentIndex];
    }
    return ALL_LETTERS[Math.floor(Math.random() * ALL_LETTERS.length)];
  }

  function spawnLetter() {
    if (!gameActive) return;

    const emptyHoles = holes.map((h, i) => ({ ...h, idx: i })).filter(h => !h.active);
    if (emptyHoles.length === 0) return;

    const pick = emptyHoles[Math.floor(Math.random() * emptyHoles.length)];
    const idx = pick.idx;
    const hole = holes[idx];
    const letter = getRandomLetter();
    const color = COLORS[Math.floor(Math.random() * COLORS.length)];

    hole.active = true;
    hole.letter = letter;
    hole.letterEl.textContent = letter;
    hole.letterEl.style.color = color;
    hole.letterEl.classList.remove('hide');
    hole.letterEl.classList.add('show');

    // Activate player screen look
    hole.el.classList.add('active-screen');

    // Animate the progress bar fill over LETTER_SHOW_TIME
    hole.fillEl.style.transition = 'none';
    hole.fillEl.style.width = '0%';
    hole.fillEl.style.background = color;
    void hole.fillEl.offsetWidth;
    hole.fillEl.style.transition = `width ${LETTER_SHOW_TIME}ms linear`;
    hole.fillEl.style.width = '100%';

    // Countdown timer label
    let remaining = LETTER_SHOW_TIME;
    hole.timeEl.textContent = (remaining / 1000).toFixed(1);
    hole._countdownInterval = setInterval(() => {
      remaining -= 100;
      if (remaining <= 0) {
        clearInterval(hole._countdownInterval);
        hole.timeEl.textContent = '0.0';
      } else {
        hole.timeEl.textContent = (remaining / 1000).toFixed(1);
      }
    }, 100);

    clearTimeout(hole.timeout);
    hole.timeout = setTimeout(() => {
      hideLetter(idx);
    }, LETTER_SHOW_TIME);
  }

  function hideLetter(idx) {
    const hole = holes[idx];
    if (!hole.active) return;
    hole.letterEl.classList.remove('show');
    hole.letterEl.classList.add('hide');
    clearInterval(hole._countdownInterval);
    setTimeout(() => {
      hole.active = false;
      hole.letter = '';
      hole.letterEl.classList.remove('hide');
      hole.el.classList.remove('active-screen');
      hole.fillEl.style.transition = 'none';
      hole.fillEl.style.width = '0%';
      hole.timeEl.textContent = '0:00';
    }, 200);
  }

  function onHoleClick(idx) {
    if (!gameActive) return;
    const hole = holes[idx];
    if (!hole.active) return;

    const needed = TARGET[currentIndex];
    if (hole.letter === needed) {
      currentIndex++;
      score += 100;
      playPop();
      updateScoreDisplay();
      hole.el.classList.remove('correct-hit');
      void hole.el.offsetWidth;
      hole.el.classList.add('correct-hit');
      spawnParticles(hole.el);
      hideLetter(idx);
      updateProgress();

      if (currentIndex >= TARGET.length) {
        winGame();
      }
    } else {
      lives--;
      playBuzz();
      updateLivesDisplay();
      const livesEl = document.getElementById('lives');
      livesEl.classList.remove('hit');
      void livesEl.offsetWidth;
      livesEl.classList.add('hit');
      hole.el.classList.remove('wrong-hit');
      void hole.el.offsetWidth;
      hole.el.classList.add('wrong-hit');

      if (lives <= 0) {
        loseGame();
      }
    }
  }

  function spawnParticles(el) {
    const rect = el.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    for (let i = 0; i < 12; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const angle = (Math.PI * 2 * i) / 12;
      const dist = 40 + Math.random() * 40;
      const dx = Math.cos(angle) * dist;
      const dy = Math.sin(angle) * dist;
      const color = COLORS[Math.floor(Math.random() * COLORS.length)];
      p.style.cssText = `left:${cx}px;top:${cy}px;background:${color};box-shadow:0 0 6px ${color};transition:all 0.5s ease-out;`;
      document.body.appendChild(p);
      requestAnimationFrame(() => {
        p.style.transform = `translate(${dx}px, ${dy}px)`;
        p.style.opacity = '0';
      });
      setTimeout(() => p.remove(), 500);
    }
  }

  function startGame() {
    currentIndex = 0;
    lives = MAX_LIVES;
    score = 0;
    gameActive = true;
    startTime = Date.now();
    updateProgress();
    updateLivesDisplay();
    updateScoreDisplay();

    document.getElementById('overlay').classList.add('hidden');
    startBGM();

    holes.forEach((h, i) => {
      clearTimeout(h.timeout);
      clearInterval(h._countdownInterval);
      h.active = false;
      h.letter = '';
      h.letterEl.classList.remove('show', 'hide');
      h.el.classList.remove('active-screen');
      h.fillEl.style.transition = 'none';
      h.fillEl.style.width = '0%';
      h.timeEl.textContent = '0:00';
    });

    timerInterval = setInterval(() => {
      const elapsed = ((Date.now() - startTime) / 1000).toFixed(2);
      document.getElementById('timer').textContent = elapsed + 's';
    }, 50);

    spawnInterval = setInterval(spawnLetter, SPAWN_INTERVAL);
  }

  function loseGame() {
    gameActive = false;
    clearInterval(timerInterval);
    clearInterval(spawnInterval);
    stopBGM();
    playLose();

    holes.forEach((h, i) => { clearTimeout(h.timeout); clearInterval(h._countdownInterval); hideLetter(i); });

    document.body.style.transition = 'background 0.2s';
    document.body.style.background = '#2a0a0a';
    setTimeout(() => { document.body.style.background = '#0a0a1a'; }, 300);

    setTimeout(() => {
      document.getElementById('overlayTitle').textContent = 'GAME OVER';
      document.getElementById('overlayTitle').style.color = '#f44';
      document.getElementById('overlayTitle').style.textShadow = '0 0 30px #f44';
      document.getElementById('overlaySubtitle').textContent = `Score: ${score} · Got ${currentIndex}/${TARGET.length} letters`;
      document.getElementById('overlayBtn').textContent = 'TRY AGAIN';
      document.getElementById('overlay').classList.remove('hidden');
    }, 800);
  }

  function winGame() {
    gameActive = false;
    clearInterval(timerInterval);
    clearInterval(spawnInterval);
    stopBGM();

    const finalTime = ((Date.now() - startTime) / 1000).toFixed(2);

    holes.forEach((h, i) => { clearTimeout(h.timeout); clearInterval(h._countdownInterval); hideLetter(i); });

    playFanfare();

    for (let i = 0; i < 80; i++) {
      setTimeout(() => {
        const c = document.createElement('div');
        c.className = 'confetti';
        const color = COLORS[Math.floor(Math.random() * COLORS.length)];
        c.style.cssText = `left:${Math.random()*100}vw;top:-10px;background:${color};box-shadow:0 0 4px ${color};animation-duration:${1.5+Math.random()*2}s;`;
        document.body.appendChild(c);
        setTimeout(() => c.remove(), 4000);
      }, i * 30);
    }

    setTimeout(() => {
      document.getElementById('overlayTitle').textContent = 'HELLO WORLD!';
      document.getElementById('overlayTitle').style.color = '#0ff';
      document.getElementById('overlayTitle').style.textShadow = '0 0 30px #0ff';
      document.getElementById('overlaySubtitle').textContent = `Score: ${score} · Completed in ${finalTime}s`;
      document.getElementById('overlayBtn').textContent = 'PLAY AGAIN';
      document.getElementById('overlay').classList.remove('hidden');
    }, 1200);
  }

  // Initial state
  updateProgress();
  updateLivesDisplay();
</script>

</body>
</html>
